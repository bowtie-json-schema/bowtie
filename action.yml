name: Setup Bowtie
description: "Install Bowtie, hooray!"
author: "Julian Berman"
branding:
  icon: package
  color: blue
inputs:
  version:
    required: false
    description: "bowtie version to be installed"
    default: ""
  installation-attempts:
    required: false
    default: "5"
    description: "number of attempts to install bowtie with specified version if this version is not yet available"
  installation-wait-seconds:
    required: false
    default: "10"
    description: "number of seconds to wait before performing the next installation attempt if current one has failed"

runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        python-version: "3.14"

    - name: Install latest Bowtie
      if: inputs.version == ''
      run: uv tool install bowtie-json-schema
      shell: bash

    - name: "Install Bowtie ${{ inputs.version }}"
      if: inputs.version != ''
      run: |
        for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
          uv tool install --refresh-package bowtie-json-schema "bowtie-json-schema==${INPUT_VERSION#v}" && exit 0
          echo "Attempt $attempt failed, waiting ${WAIT_SECONDS}s for PyPI to index ${INPUT_VERSION}..."
          sleep "$WAIT_SECONDS"
        done
        echo "Failed to install bowtie-json-schema==${INPUT_VERSION#v} after $MAX_ATTEMPTS attempts."
        exit 1
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        MAX_ATTEMPTS: ${{ inputs.installation-attempts }}
        WAIT_SECONDS: ${{ inputs.installation-wait-seconds }}
