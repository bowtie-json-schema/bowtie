name: Redeploy the UI

on:
  workflow_call:
    inputs:
      report_artifact_in_scope:
        required: false
        type: boolean
  workflow_dispatch:

permissions:
  contents: read # for actions/checkout and general read access

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build the frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: frontend/package.json

      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
        with:
          package_json_file: frontend/package.json
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --dir frontend --frozen-lockfile --strict-peer-dependencies

      - name: Build the UI
        env:
          BASE_PATH: ${{ github.repository_owner == 'bowtie-json-schema' && '/' || '/bowtie' }}
        run: pnpm run --dir frontend build --base="$BASE_PATH"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: frontend-build
          path: frontend/build

  include-latest-reports:
    name: Include latest reports
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Create _site directory
        run: mkdir _site
      - name: Download frontend build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: frontend-build
          path: _site

      # if called from report workflow
      - name: Download test report from local artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        if: inputs.report_artifact_in_scope == true
        with:
          name: site
          path: _site

      # if called as a separate workflow
      - name: Download latest test report
        if: inputs.report_artifact_in_scope == false
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          workflow: report.yml
          branch: main
          name: site
          path: _site

      - name: Download latest versioned test reports
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          workflow: versioned-report.yml
          branch: main
          name: implementations
          path: _site/implementations

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5

  deploy:
    name: Deploy to GitHub Pages
    permissions:
      pages: write # to deploy to GitHub Pages
      id-token: write # to verify the deployment originates from this workflow
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: include-latest-reports
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
