# This workflow is the main workflow for regenerating the data needed for Bowtie's UI.
# It retests all of Bowtie's supported implementations, publishing the reports (and other auxiliary metadata) for use in the frontend.
name: Collect New Test Results

on:
  workflow_call:
    inputs:
      bowtie-version:
        type: string
        required: false
        default: ""
      report_benchmark_artifact_in_scope:
        required: false
        type: boolean
  workflow_dispatch:
  schedule:
    # Every 6 hours, at 15 past the hour
    - cron: "15 */6 * * *"

permissions:
  contents: read
  # These are needed at workflow level because reusable workflow permissions
  # are intersected with the caller's — job-level permissions alone aren't enough.
  pages: write # zizmor: ignore[excessive-permissions]
  id-token: write # zizmor: ignore[excessive-permissions]

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  matrix:
    name: Collect Matrix Parameters
    runs-on: ubuntu-latest
    outputs:
      implementations: ${{ steps.implementations-matrix.outputs.implementations }}
      dialects: ${{ steps.dialects-matrix.outputs.dialects }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Bowtie
        uses: ./
        with:
          version: ${{ inputs.bowtie-version }}

      - name: Collect supported implementations
        id: implementations-matrix
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          printf 'implementations=%s\n' "$(bowtie filter-implementations --format json)" >> $GITHUB_OUTPUT

      - name: Collect supported dialects
        id: dialects-matrix
        run: |
          printf 'dialects=%s\n' "$(jq -c '[.[].shortName]' data/dialects.json)" >> $GITHUB_OUTPUT

  regenerate-reports:
    name: Generate Per-Implementation Reports
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        implementation: ${{ fromJson(needs.matrix.outputs.implementations) }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Bowtie
        uses: ./
        with:
          version: ${{ inputs.bowtie-version }}

      - name: Generate Reports
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MATRIX_IMPLEMENTATION: ${{ matrix.implementation }}
          DIALECTS: ${{ join(fromJson(needs.matrix.outputs.dialects), ' ') }}
        run: |
          mkdir reports
          for dialect in ${DIALECTS}; do
            bowtie suite -i "${MATRIX_IMPLEMENTATION}" "https://github.com/json-schema-org/JSON-Schema-Test-Suite/tree/main/tests/${dialect}" > "reports/${dialect}.json" || true
            # Unsupported dialects produce no output, which is fine.
            if [ ! -s "reports/${dialect}.json" ]; then
              rm -f "reports/${dialect}.json"
            fi
          done

      # This is useful to debug whether Bowtie accidentally fetched some huge
      # number of container images.
      - name: Show what images we fetched
        run: docker images
        if: always()

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: impl-report-${{ matrix.implementation }}
          path: reports/
          if-no-files-found: ignore

  combine-reports:
    name: Combine Reports
    needs:
      - matrix
      - regenerate-reports
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dialect: ${{ fromJson(needs.matrix.outputs.dialects) }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Bowtie
        uses: ./
        with:
          version: ${{ inputs.bowtie-version }}

      - name: Download All Implementation Reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: impl-report-*
          path: reports/

      - name: Combine Reports
        run: |
          dialect=${MATRIX_DIALECT}
          # Collect all per-implementation reports for this dialect
          reports=()
          for dir in reports/impl-report-*/; do
            if [ -f "${dir}${dialect}.json" ]; then
              reports+=("${dir}${dialect}.json")
            fi
          done
          if [ ${#reports[@]} -gt 0 ]; then
            bowtie combine "${reports[@]}" > "${dialect}.json"
          else
            echo "::warning::No implementation reports found for ${dialect}"
            exit 1
          fi
        env:
          MATRIX_DIALECT: ${{ matrix.dialect }}

        # FIXME: We ignore for now as now this exits unsuccessfully if there
        #        are *test* failures
      - name: Check Report is Valid
        run: |
          bowtie summary --show failures ${MATRIX_DIALECT}.json --format markdown >> $GITHUB_STEP_SUMMARY
        continue-on-error: true
        env:
          MATRIX_DIALECT: ${{ matrix.dialect }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: report-${{ matrix.dialect }}
          path: ${{ matrix.dialect }}.json

  generate-implementation-metadata:
    name: Generate Implementation Metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Bowtie
        uses: ./
        with:
          version: ${{ inputs.bowtie-version }}

      - name: Regenerate data needed by the UI
        run: |
          bowtie info $(bowtie filter-implementations | sed 's/^/-i /') --format json > implementations.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: implementations
          path: implementations.json

      - name: Regenerate data for our public APIs
        run: |
          mkdir -p api/v1/json-schema-org
          bowtie filter-implementations | \
            while read -r impl; do
              bowtie info -i $impl --format json | \
              jq --arg impl "$impl" --slurpfile dialects data/dialects.json '
                . as $info |
                {($info.source): (
                  {
                    id: $impl,
                    dialects: $info.dialects,
                    badges_urls: (
                      {
                        supported_versions: "https://bowtie.report/badges/\($info.language)-\($info.name)/supported_versions.json",
                        compliance: (
                          $info.dialects | map(
                            . as $uri |
                            $dialects[0] | map(select(.uri == $uri)) | .[0] |
                            {
                              (.uri): "https://bowtie.report/badges/\($info.language)-\($info.name)/compliance/\(.shortName).json"
                            }
                          ) | add
                        )
                      }
                    )
                  }
                )}
              '
            done | \
          jq -s 'add' > api/v1/json-schema-org/implementations

      - name: Validate the public API data against their schema(s)
        run: |
          VALIDATION=$(bowtie validate --expect valid -i python-jsonschema bowtie/schemas/api/v1/json-schema-org/implementations.json api/v1/json-schema-org/implementations)
          echo "$VALIDATION" | bowtie summary --show failures --format markdown >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: api
          path: api

  site:
    name: Assemble Site
    needs:
      - combine-reports
      - generate-implementation-metadata

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install Bowtie
        uses: ./
        with:
          version: ${{ inputs.bowtie-version }}

      - name: Create our Site Structure
        run: mkdir site

      - name: Include New Reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: report-*
          path: site/
          merge-multiple: true

      - name: Include Benchmark Report from local artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        if: inputs.report_benchmark_artifact_in_scope == true
        with:
          name: benchmarks
          path: site/benchmarks

      # if called as a separate workflow
      - name: Download latest Benchmark Report
        if: inputs.report_benchmark_artifact_in_scope == false
        uses: dawidd6/action-download-artifact@8305c0f1062bb0d184d09ef4493ecb9288447732 # v20
        with:
          workflow: benchmark.yml
          branch: main
          name: benchmarks
          path: site/benchmarks
        id: download_benchmark
        continue-on-error: true

      - name: Fallback for missing benchmarks
        if: steps.download_benchmark.outcome == 'failure'
        run: |
          mkdir -p ./site/benchmarks
          cd site/benchmarks
          curl -O https://bowtie.report/benchmarks/draft3.json
          curl -O https://bowtie.report/benchmarks/draft4.json
          curl -O https://bowtie.report/benchmarks/draft6.json
          curl -O https://bowtie.report/benchmarks/draft7.json
          curl -O https://bowtie.report/benchmarks/draft2019-09.json
          curl -O https://bowtie.report/benchmarks/draft2020-12.json

      - name: Include our UI data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: implementations
          path: site/
      - name: Include our public API data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: api
          path: site/api

      - name: Generate Badges
        run: bowtie badges

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: site
          path: site

  redeploy-frontend:
    permissions:
      contents: read # for actions/checkout in ui.yml
      pages: write # to deploy to GitHub Pages
      id-token: write # to verify the deployment originates from this workflow
    needs: site
    uses: ./.github/workflows/ui.yml
    with:
      report_artifact_in_scope: true
