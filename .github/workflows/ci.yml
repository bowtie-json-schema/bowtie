name: CI

on:
  push:
    branches-ignore:
      - "wip*"
    tags:
      - "v*"
  pull_request:
  schedule:
    # Daily at 5:12
    - cron: "12 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  list:
    name: List Nox Sessions
    runs-on: ubuntu-latest
    outputs:
      noxenvs: ${{ steps.noxenvs-matrix.outputs.noxenvs }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false
      - id: noxenvs-matrix
        run: |
          echo >>$GITHUB_OUTPUT noxenvs=$(
            uvx nox --list-sessions --json | jq '[.[].session]'
          )

  ci:
    name: Run CI
    needs: list
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        noxenv: ${{ fromJson(needs.list.outputs.noxenvs) }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libenchant-2-dev
        if: runner.os == 'Linux' && startsWith(matrix.noxenv, 'docs')
      - name: Install dependencies
        run: brew install enchant podman
        if: runner.os == 'macOS'

      - name: Install Node
        # setup-node does not enable caching unless `cache` is explicitly set
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6 # zizmor: ignore[cache-poisoning]
        with:
          node-version-file: frontend/package.json
        if: startsWith(matrix.noxenv, 'ui')
      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          package_json_file: frontend/package.json
          run_install: false
        if: startsWith(matrix.noxenv, 'ui')

      - name: Install playwright browsers
        run: |
          pnpm --dir frontend install
          pnpm --dir frontend exec playwright install --with-deps
        if: matrix.noxenv == 'ui(tests)'

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"
        if: startsWith(matrix.noxenv, 'audit')

      - name: Run nox
        env:
          BUILD_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MATRIX_NOXENV: ${{ matrix.noxenv }}
        run: uvx nox -s "${MATRIX_NOXENV}"

      - name: Upload Playwright Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: frontend/test-results
          retention-days: 14
        if: matrix.noxenv == 'ui(tests)'

  containerless:
    name: Run Containerless Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Ensure containers don't work
        run: sudo apt-get purge docker podman

      - name: Run nox
        env:
          BUILD_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uvx nox -s tests-3.14 -- -m 'not containers'

  coverage:
    name: Run Coverage
    runs-on: ubuntu-latest

    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Run nox
        run: uvx nox -s tests-3.14 -- coverage github

  automerge:
    name: Auto-merge Dependabot PRs
    needs: ci
    runs-on: ubuntu-latest

    if: github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]'

    permissions:
      contents: write # to merge pull requests
      pull-requests: write # to approve and trigger auto-merge

    steps:
      - name: Automatically merge allowed PRs
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  packaging:
    name: Build and Publish Package
    needs: ci
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.tag }}

    environment:
      name: PyPI
      url: https://pypi.org/p/bowtie-json-schema

    permissions:
      contents: write # to create GitHub releases
      id-token: write # to authenticate with PyPI via OIDC
      attestations: write # to generate build provenance attestations

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Build our distributions
        env:
          BUILD_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run --frozen --with 'build[uv]' -m build --installer=uv

        # this is temporary step to make sure we don't lose any of the implementations during migration
        # remove once all implementations are successfully migrated to separate repos
      - name: Collect known implementations
        env:
          BUILD_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXPECTED_IMPL_COUNT: 32
        run: |
          impl_count=$(uvx --from . --python 3.14 bowtie filter-implementations --format plain | wc -l)
          if [ $impl_count -lt $EXPECTED_IMPL_COUNT ]; then
            echo "bowtie collected less implementations than expected: $impl_count instead of $EXPECTED_IMPL_COUNT" >> $GITHUB_STEP_SUMMARY
            uvx --from . --python 3.14 bowtie filter-implementations --format plain >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Generate attestation for wheels
        if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags')
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: "dist/*.whl"

      - name: Publish to PyPI
        if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags')
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
      - name: Create a Release
        if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags')
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Current version
        id: version
        if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags')
        run: echo "tag=${GITHUB_REF#refs/*/}" >> $GITHUB_OUTPUT

  report:
    needs: packaging
    permissions:
      contents: read
      pages: write # to deploy to GitHub Pages via report.yml
      id-token: write # to verify the deployment originates from this repo
    uses: ./.github/workflows/report.yml
    with:
      bowtie-version: ${{ needs.packaging.outputs.version }}
    if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags')
